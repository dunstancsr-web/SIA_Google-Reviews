name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */5 * * *'   # Runs every 5 hours
  workflow_dispatch:          # Lets you trigger it manually too

jobs:
  ping-app:
    runs-on: ubuntu-latest

    steps:
      - name: Ping the Streamlit App
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://reviewsdataverse.streamlit.app
