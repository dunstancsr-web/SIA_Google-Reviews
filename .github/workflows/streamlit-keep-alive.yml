name: SIA Dashboard Keep-Alive

on:
  schedule:
    # This runs exactly every 6 hours (4x per day)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  browser-visit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Visit Page and Wake Dashboard
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Navigating to wake page...');

            try {
              // Replace this URL with your deployed Streamlit app URL if needed.
              // Example: https://your-app-name.streamlit.app
              await page.goto('https://dunstancsr-web.github.io/DunstanPortfolio/portfolio-reels.html', {
                waitUntil: 'load',
                timeout: 90000
              });

              console.log('Page loaded. Waiting 30s for dashboard wake-up...');
              await new Promise(r => setTimeout(r, 30000));

              console.log('Success: Keep-alive visit completed.');
            } catch (error) {
              console.error('Navigation note:', error.message);
            } finally {
              await browser.close();
            }
          })();
          "
