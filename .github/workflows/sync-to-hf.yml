name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Add HF as a remote
          git remote add space https://huggingface.co/spaces/dunstancsr/reviewsdataverse.streamlit
          # Push to HF (replace with your details!)
          git push https://dunstancsr:$HF_TOKEN@huggingface.co/spaces/dunstancsr/reviewsdataverse.streamlit main --force